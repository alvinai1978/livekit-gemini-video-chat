services:
  - type: web
    name: livekit-gemini-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GEMINI_TEXT_MODEL
        value: gemini-2.5-flash
      - key: LIVEKIT_AGENT_NAME
        value: az-gemini-voice-assistant
      - key: DEBUG_AI_ERRORS
        value: "false"

  - type: worker
    name: livekit-gemini-voice-agent
    runtime: python
    rootDir: agent
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py start
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LIVEKIT_AGENT_NAME
        value: az-gemini-voice-assistant
      - key: GEMINI_LIVE_MODEL
        value: gemini-3.1-flash-live-preview
      - key: GEMINI_LIVE_VOICE
        value: Puck
